x-api: &api
  build: .
  volumes:
    - sock:/run/sock
  networks:
    - rinha-network
  deploy:
    resources:
      limits:
        cpus: "0.40"
        memory: "130MB"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - rinha-network
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "16MB"

  api1:
    <<: *api
    environment:
      - SOCKET_PATH=/run/sock/api1.sock
      - GOMAXPROCS=1
      - IVF_K=4096
      - IVF_NPROBE=8
      - IVF_RETRY_EXTRA=8
      - GOGC=100
      - GOMEMLIMIT=25MiB
    healthcheck:
      test: ["CMD", "curl", "-s", "--unix-socket", "/run/sock/api1.sock", "http://localhost/ready"]
      interval: 5s
      timeout: 3s
      start_period: 3s
      retries: 3

  api2:
    <<: *api
    environment:
      - SOCKET_PATH=/run/sock/api2.sock
      - GOMAXPROCS=1
      - IVF_K=4096
      - IVF_NPROBE=8
      - IVF_RETRY_EXTRA=8
      - GOGC=100
      - GOMEMLIMIT=25MiB
    healthcheck:
      test: ["CMD", "curl", "-s", "--unix-socket", "/run/sock/api2.sock", "http://localhost/ready"]
      interval: 5s
      timeout: 3s
      start_period: 3s
      retries: 3

volumes:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=0777"

networks:
  rinha-network:
    driver: bridge
